<!doctype html><html lang='fr'><head><meta charset='utf-8'><title>Évaluation — Produit scalaire</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  :root { --accent:#4f46e5; --ok:#16a34a; --bad:#dc2626; --muted:#6b7280; }
  *{box-sizing:border-box} body{font-family:system-ui,sans-serif;margin:0;background:#f9fafb;color:#111}
  header{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 24px}
  header h1{margin:0;font-size:1.1rem} header .sub{color:var(--muted);font-size:.85rem}
  main{max-width:780px;margin:0 auto;padding:24px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .qid{font-size:.75rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
  .stem{margin:8px 0 12px;font-size:1.02rem}
  .choice{display:block;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;margin:6px 0;cursor:pointer}
  .choice:hover{border-color:var(--accent)}
  .choice.correct{border-color:var(--ok);background:#f0fdf4}
  .choice.wrong{border-color:var(--bad);background:#fef2f2}
  .badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:999px;border:1px solid currentColor;margin-right:6px}
  .b-skill{color:var(--accent)} .b-type{color:#b45309} .b-ok{color:var(--ok)} .b-bad{color:var(--bad)}
  img.figure{max-width:100%;border-radius:8px;margin:8px 0;border:1px solid #e5e7eb}
  .nav{display:flex;justify-content:space-between;margin-top:16px}
  button{background:var(--accent);color:#fff;border:0;padding:8px 16px;border-radius:8px;cursor:pointer}
  button:disabled{opacity:.4;cursor:not-allowed}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center}
  .stat .v{font-size:1.6rem;font-weight:700;color:var(--accent)}
  .stat .l{font-size:.75rem;color:var(--muted);margin-top:4px}
  .meta{font-size:.8rem;color:var(--muted);margin-top:6px}
  details{margin-top:8px} details summary{cursor:pointer;color:var(--muted);font-size:.85rem}
</style>
</head><body>
    <header>
      <h1>Évaluation — Produit scalaire</h1>
      <div class="sub">Une question à la fois. Répondez puis cliquez sur « Suivant ».</div>
    </header>
    <main>
      <div id="progress" class="meta"></div>
      <div id="qcard" class="card"></div>
      <div class="nav">
        <button id="prev">Précédent</button>
        <button id="next">Suivant</button>
      </div>
      <div id="done" style="display:none" class="card">
        <h3>Terminé ✅</h3>
        <p>Vos réponses ont été enregistrées localement.</p>
        <pre id="summary" style="background:#f3f4f6;padding:12px;border-radius:8px;overflow:auto"></pre>
      </div>
    </main>
    <script>
      const QUESTIONS = [{"id": "T1-D1-Q1", "number": 1, "stem": "À quel degré te rappelles-tu la leçon du produit scalaire ?", "image": null, "choices": [{"letter": "A", "text": "J'ai tout oublié"}, {"letter": "B", "text": "Je me rappelle quelques parties"}, {"letter": "C", "text": "Je me rappelle bien"}, {"letter": "D", "text": "Je me rappelle tout"}], "expected_free_text": false}, {"id": "T1-D1-Q2", "number": 2, "stem": "Le produit scalaire de deux vecteurs $\\vec{U}$ et $\\vec{V}$ est :", "image": null, "choices": [{"letter": "A", "text": "$\\|\\vec{U}\\| \\cdot \\|\\vec{V}\\| \\cdot \\cos(\\widehat{(\\vec{U}, \\vec{V})})$"}, {"letter": "B", "text": "$\\|\\vec{U}\\| \\cdot \\|\\vec{V}\\| \\cdot \\sin(\\widehat{(\\vec{U}, \\vec{V})})$"}, {"letter": "C", "text": "$\\|\\vec{U}\\| \\cdot \\|\\vec{V}\\| \\cdot \\tan(\\widehat{(\\vec{U}, \\vec{V})})$"}, {"letter": "D", "text": "J'ai oublié"}], "expected_free_text": false}, {"id": "T1-D1-Q3", "number": 3, "stem": "Deux vecteurs $\\vec{U}$ et $\\vec{V}$ sont orthogonaux si :", "image": null, "choices": [{"letter": "A", "text": "$\\vec{U} \\cdot \\vec{V} = 0$"}, {"letter": "B", "text": "$\\vec{U} \\cdot \\vec{V} = \\vec{0}$"}, {"letter": "C", "text": "$\\vec{U}$ et $\\vec{V}$ sont nuls"}, {"letter": "D", "text": "J'ai oublié"}], "expected_free_text": false}, {"id": "T1-D1-Q4", "number": 4, "stem": "Théorème d'Al-Kashi — quels que soient les points $A, B, C$ :", "image": null, "choices": [{"letter": "A", "text": "$BC^2 = AB^2 + AC^2 - 2\\, \\vec{AB} \\cdot \\vec{AC}$"}, {"letter": "B", "text": "$AB^2 = CB^2 + CA^2 - 2\\, \\vec{CB} \\cdot \\vec{CA}$"}, {"letter": "C", "text": "J'ai oublié"}], "expected_free_text": false}, {"id": "T1-D1-Q5", "number": 5, "stem": "Soit $ABC$ un triangle et $D$ le milieu de $[BC]$ :", "image": null, "choices": [{"letter": "A", "text": "$AB^2 + AC^2 = \\frac{1}{2}BC^2 + 2AD^2$"}, {"letter": "B", "text": "$AC^2 + BC^2 = \\frac{1}{2}AB^2 + 2BD^2$"}, {"letter": "C", "text": "J'ai oublié"}], "expected_free_text": false}, {"id": "T2-D1-Q6", "number": 6, "stem": "Dans la figure 2, déterminer les coordonnées des points $B(\\ ;\\ )$, $C(\\ ;\\ )$, $D(\\ ;\\ )$, $E(\\ ;\\ )$, $F(\\ ;\\ )$, $G(\\ ;\\ )$.", "image": "images/q6_figure2.png", "choices": [], "expected_free_text": true}, {"id": "T2-D1-Q7", "number": 7, "stem": "Déterminer les coordonnées des vecteurs $\\vec{U}, \\vec{V}, \\vec{a}, \\vec{W}$ :", "image": null, "choices": [], "expected_free_text": true}, {"id": "T2-D1-Q8", "number": 8, "stem": "Calculer les normes $\\|\\vec{U}\\|, \\|\\vec{V}\\|, \\|\\vec{W}\\|, \\|\\vec{a}\\|$ avec $\\|\\vec{U}\\| = \\sqrt{(x_B - x_O)^2 + (y_B - y_O)^2}$.", "image": null, "choices": [], "expected_free_text": true}, {"id": "T3-D1-Q9", "number": 9, "stem": "Calculer $\\vec{U} \\cdot \\vec{V} = \\|\\vec{OB}\\| \\cdot \\|\\vec{OC}\\| \\cdot \\cos(\\widehat{(\\vec{OB}, \\vec{OC})})$ :", "image": null, "choices": [{"letter": "A", "text": "$8$"}, {"letter": "B", "text": "$-8$"}, {"letter": "C", "text": "$10$"}], "expected_free_text": false}, {"id": "T3-D1-Q10", "number": 10, "stem": "Produit scalaire analytique : $\\vec{a} \\cdot \\vec{W} = ?$", "image": null, "choices": [{"letter": "A", "text": "$8$"}, {"letter": "B", "text": "$-8$"}, {"letter": "C", "text": "$9$"}], "expected_free_text": false}, {"id": "T3-D1-Q11", "number": 11, "stem": "Soit $ABC$ un triangle tel que $AB = 6$, $AC = 5$, $BC = 7$. Vérifier que $\\cos(\\widehat{BAC}) = \\frac{1}{5}$, puis calculer $\\vec{AB} \\cdot \\vec{AC}$.", "image": null, "choices": [{"letter": "A", "text": "$\\cos(\\widehat{BAC}) = \\dfrac{1}{5}$ \\; et \\; $\\vec{AB}\\cdot\\vec{AC}=6$"}, {"letter": "B", "text": "$\\cos(\\widehat{BAC}) = \\dfrac{2}{5}$ \\; et \\; $\\vec{AB}\\cdot\\vec{AC}=12$"}, {"letter": "C", "text": "$\\cos(\\widehat{BAC}) = -\\dfrac{1}{5}$ \\; et \\; $\\vec{AB}\\cdot\\vec{AC}=-6$"}], "expected_free_text": false}, {"id": "T3-D1-Q12", "number": 12, "stem": "Déduire $\\vec{BA} \\cdot \\vec{BC}$.", "image": "images/q12_figure.png", "choices": [{"letter": "A", "text": "$\\vec{BA}\\cdot\\vec{BC} = \\dfrac{AB^2 + BC^2 - AC^2}{2} = \\dfrac{36+49-25}{2} = 30$"}, {"letter": "B", "text": "$\\vec{BA}\\cdot\\vec{BC} = 15$"}, {"letter": "C", "text": "$\\vec{BA}\\cdot\\vec{BC} = -30$"}], "expected_free_text": false}];
      const answers = {};
      let i = 0;
      const card = document.getElementById('qcard');
      const prog = document.getElementById('progress');
      const btnPrev = document.getElementById('prev');
      const btnNext = document.getElementById('next');

      function render() {
        const q = QUESTIONS[i];
        prog.textContent = `Question ${i+1} / ${QUESTIONS.length}`;
        const img = q.image ? `<img class="figure" src="${q.image}" alt="">` : '';
        const choices = q.choices.map(c => `
          <label class="choice">
            <input type="radio" name="ans" value="${c.letter}" ${answers[q.id]===c.letter?'checked':''}>
            <strong>${c.letter}.</strong> ${c.text}
          </label>`).join('');
        const freeBox = q.expected_free_text ? `
          <textarea rows="4" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px"
            placeholder="Votre réponse…">${answers[q.id+':text']||''}</textarea>` : '';
        card.innerHTML = `
          <div class="qid">${q.id}</div>
          <div class="stem">${q.stem}</div>
          ${img}
          ${choices}
          ${freeBox}`;
        card.querySelectorAll('input[name=ans]').forEach(r => r.onchange = e => answers[q.id] = e.target.value);
        const ta = card.querySelector('textarea');
        if (ta) ta.oninput = e => answers[q.id+':text'] = e.target.value;
        btnPrev.disabled = i === 0;
        btnNext.textContent = i === QUESTIONS.length - 1 ? 'Terminer' : 'Suivant';
        if (window.MathJax) MathJax.typesetPromise([card]);
      }

      btnPrev.onclick = () => { if (i > 0) { i--; render(); } };
      btnNext.onclick = () => {
        if (i < QUESTIONS.length - 1) { i++; render(); }
        else {
          document.querySelector('main > .card').style.display = 'none';
          document.querySelector('.nav').style.display = 'none';
          prog.style.display = 'none';
          document.getElementById('done').style.display = 'block';
          document.getElementById('summary').textContent = JSON.stringify(answers, null, 2);
        }
      };
      render();
    </script>
    </body></html>
