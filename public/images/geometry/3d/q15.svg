<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Parallelepiped with diagonals -->
  <defs>
    <linearGradient id="cubeFace1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Parallelepiped faces -->
  <polygon points="60,100 180,100 180,220 60,220" fill="url(#cubeFace1)" stroke="#999" stroke-width="1.5"/>
  <polygon points="60,100 130,50 250,50 180,100" fill="#e5e7eb" stroke="#999" stroke-width="1.5"/>
  <polygon points="180,100 250,50 250,170 180,220" fill="#d1d5db" stroke="#999" stroke-width="1.5"/>

  <!-- Diagonals (red) - all pass through center -->
  <line x1="60" y1="100" x2="250" y2="170" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="100" x2="130" y2="170" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="220" x2="250" y2="50" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="220" x2="130" y2="50" stroke="#ef4444" stroke-width="2" opacity="0.7"/>

  <!-- Center point -->
  <circle cx="155" cy="135" r="4" fill="#000"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Diagonales principales</text>
  <text x="140" y="220" font-size="11" fill="#666">Parallélépipède</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Diagonales se coupent au centre</text>
</svg>
