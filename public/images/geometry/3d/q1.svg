<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Two intersecting planes -->
  <defs>
    <linearGradient id="plane1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="plane2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Plane 1 (blue) -->
  <polygon points="50,80 250,80 280,200 20,200" fill="url(#plane1)" stroke="#3b82f6" stroke-width="2"/>

  <!-- Plane 2 (red) -->
  <polygon points="80,50 200,50 220,280 60,280" fill="url(#plane2)" stroke="#ef4444" stroke-width="2"/>

  <!-- Intersection line -->
  <line x1="90" y1="70" x2="210" y2="240" stroke="#000" stroke-width="3"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Deux plans π₁ et π₂</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Intersection: droite d</text>
</svg>
