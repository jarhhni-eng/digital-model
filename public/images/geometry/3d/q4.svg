<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Two perpendicular planes -->
  <defs>
    <linearGradient id="planeA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="planeB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Horizontal plane (blue) -->
  <polygon points="40,150 260,150 280,180 20,180" fill="url(#planeA)" stroke="#3b82f6" stroke-width="2"/>

  <!-- Vertical plane (green) -->
  <polygon points="150,40 150,260 180,280 180,20" fill="url(#planeB)" stroke="#10b981" stroke-width="2"/>

  <!-- Right angle indicator -->
  <rect x="150" y="150" width="20" height="20" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Plans perpendiculaires</text>
  <text x="120" y="120" font-size="12" fill="#3b82f6" font-weight="bold">π</text>
  <text x="210" y="120" font-size="12" fill="#10b981" font-weight="bold">π'</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">π ⊥ π'</text>
</svg>
