<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Cube with hexagonal section -->
  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Cube -->
  <polygon points="50,120 150,120 150,220 50,220" fill="none" stroke="#999" stroke-width="1.5"/>
  <polygon points="150,120 220,70 220,170 150,220" fill="none" stroke="#999" stroke-width="1.5"/>
  <polygon points="50,120 220,70 220,170 150,220" fill="none" stroke="#999" stroke-width="1"/>

  <!-- Hexagonal section (green) -->
  <polygon points="80,100 120,80 180,80 210,120 180,160 120,160" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="2.5"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Section hexagonale</text>
  <text x="145" y="130" font-size="12" fill="#10b981" font-weight="bold">Hexagone</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Plan parallèle à une face crée un hexagone</text>
</svg>
