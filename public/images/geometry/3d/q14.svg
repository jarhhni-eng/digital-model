<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Three planes intersection -->
  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Plane 1 (blue) - horizontal -->
  <polygon points="50,100 200,100 220,140 30,140" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Plane 2 (red) - tilted left -->
  <polygon points="100,50 100,220 140,240 140,70" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Plane 3 (green) - tilted right -->
  <polygon points="150,60 200,220 240,210 190,50" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>

  <!-- Intersection point -->
  <circle cx="140" cy="130" r="5" fill="#000"/>

  <!-- Intersection lines -->
  <line x1="100" y1="100" x2="180" y2="160" stroke="#333" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="60" x2="140" y2="180" stroke="#333" stroke-width="2" opacity="0.6"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Intersection de 3 plans</text>
  <text x="70" y="120" font-size="10" fill="#3b82f6" font-weight="bold">π₁</text>
  <text x="100" y="190" font-size="10" fill="#ef4444" font-weight="bold">π₂</text>
  <text x="210" y="150" font-size="10" fill="#10b981" font-weight="bold">π₃</text>
</svg>
