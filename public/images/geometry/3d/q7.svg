<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Two skew lines -->
  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Cube reference -->
  <polygon points="50,120 150,120 150,220 50,220" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <polygon points="150,120 220,70 220,170 150,220" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <polygon points="50,120 220,70 220,170 150,220" fill="none" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Line 1 (red, horizontal) -->
  <line x1="50" y1="120" x2="220" y2="70" stroke="#ef4444" stroke-width="3"/>
  <circle cx="50" cy="120" r="4" fill="#ef4444"/>
  <circle cx="220" cy="70" r="4" fill="#ef4444"/>

  <!-- Line 2 (blue, diagonal) -->
  <line x1="150" y1="120" x2="150" y2="220" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="150" cy="120" r="4" fill="#3b82f6"/>
  <circle cx="150" cy="220" r="4" fill="#3b82f6"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Droites gauches</text>
  <text x="100" y="95" font-size="11" fill="#ef4444" font-weight="bold">d₁</text>
  <text x="175" y="170" font-size="11" fill="#3b82f6" font-weight="bold">d₂</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">d₁ et d₂ ne se coupent pas et ne sont pas parallèles</text>
</svg>
