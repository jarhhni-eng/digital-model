<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Pyramid with parallel section -->
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="section" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Base (red) -->
  <polygon points="50,200 250,200 220,240 80,240" fill="url(#base)" stroke="#ef4444" stroke-width="2"/>

  <!-- Pyramid sides -->
  <line x1="150" y1="30" x2="50" y2="200" stroke="#999" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="250" y2="200" stroke="#999" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="80" y2="240" stroke="#999" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="220" y2="240" stroke="#999" stroke-width="1.5"/>

  <!-- Cross section (green, parallel to base) -->
  <polygon points="90,120 210,120 200,150 100,150" fill="url(#section)" stroke="#10b981" stroke-width="2"/>

  <!-- Apex -->
  <circle cx="150" cy="30" r="3" fill="#000"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Section de pyramide</text>
  <text x="50" y="190" font-size="11" fill="#ef4444" font-weight="bold">Base</text>
  <text x="220" y="135" font-size="11" fill="#10b981" font-weight="bold">Section</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Section similaire à la base</text>
</svg>
