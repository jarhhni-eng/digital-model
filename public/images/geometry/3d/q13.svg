<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Line perpendicular to plane -->
  <defs>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Plane π -->
  <polygon points="50,150 250,150 270,200 30,200" fill="url(#planeGrad)" stroke="#10b981" stroke-width="2"/>

  <!-- Two lines in plane (concurrent) -->
  <line x1="150" y1="150" x2="100" y2="80" stroke="#999" stroke-width="2"/>
  <line x1="150" y1="150" x2="200" y2="80" stroke="#999" stroke-width="2"/>

  <!-- Perpendicular line l (red) -->
  <line x1="150" y1="40" x2="150" y2="150" stroke="#ef4444" stroke-width="3"/>
  <circle cx="150" cy="40" r="4" fill="#ef4444"/>

  <!-- Right angle indicator at intersection -->
  <rect x="143" y="143" width="14" height="14" fill="none" stroke="#000" stroke-width="1"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Perpendiculaire au plan</text>
  <text x="175" y="95" font-size="11" fill="#666">l</text>
  <text x="200" y="165" font-size="11" fill="#10b981" font-weight="bold">π</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">l ⊥ π</text>
</svg>
