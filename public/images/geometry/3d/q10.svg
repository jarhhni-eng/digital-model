<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle projection -->
  <defs>
    <linearGradient id="plane" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Plane -->
  <polygon points="40,150 260,150 280,200 20,200" fill="url(#plane)" stroke="#10b981" stroke-width="2"/>

  <!-- Circle (tilted, red) -->
  <ellipse cx="150" cy="80" rx="60" ry="30" fill="none" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Projection lines -->
  <line x1="100" y1="110" x2="130" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="50" x2="150" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="110" x2="170" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Projected ellipse (blue) -->
  <ellipse cx="150" cy="165" rx="60" ry="15" fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Projection orthogonale</text>
  <text x="80" y="70" font-size="11" fill="#ef4444" font-weight="bold">Cercle</text>
  <text x="150" y="190" font-size="11" fill="#3b82f6" font-weight="bold">Ellipse</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Projection: cercle ou ellipse</text>
</svg>
