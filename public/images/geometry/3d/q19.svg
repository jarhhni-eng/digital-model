<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Point distance to plane -->
  <defs>
    <linearGradient id="planeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Plane π -->
  <polygon points="40,150 260,150 280,200 20,200" fill="url(#planeGrad2)" stroke="#10b981" stroke-width="2"/>

  <!-- Point P (red) -->
  <circle cx="150" cy="50" r="5" fill="#ef4444"/>

  <!-- Perpendicular distance (blue line) -->
  <line x1="150" y1="50" x2="150" y2="150" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Foot of perpendicular -->
  <circle cx="150" cy="150" r="4" fill="#3b82f6"/>

  <!-- Right angle indicator -->
  <rect x="145" y="143" width="10" height="10" fill="none" stroke="#000" stroke-width="1"/>

  <!-- Other distances (dashed, longer) -->
  <line x1="150" y1="50" x2="100" y2="170" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="150" y1="50" x2="200" y2="170" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Distance point-plan</text>
  <text x="160" y="50" font-size="11" fill="#ef4444" font-weight="bold">P</text>
  <text x="165" y="100" font-size="11" fill="#3b82f6" font-weight="bold">d(P,π)</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Distance minimale: ligne perpendiculaire</text>
</svg>
