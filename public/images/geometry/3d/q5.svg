<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Cube with highlighted lines AB and GH -->
  <defs>
    <linearGradient id="cubeFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#f9fafb"/>

  <!-- Front face -->
  <polygon points="60,100 180,100 180,220 60,220" fill="url(#cubeFace)" stroke="#999" stroke-width="1.5"/>

  <!-- Top face -->
  <polygon points="60,100 130,50 250,50 180,100" fill="#e5e7eb" stroke="#999" stroke-width="1.5"/>

  <!-- Right face -->
  <polygon points="180,100 250,50 250,170 180,220" fill="#d1d5db" stroke="#999" stroke-width="1.5"/>

  <!-- Edge AB (red, front bottom) -->
  <line x1="60" y1="220" x2="180" y2="220" stroke="#ef4444" stroke-width="3"/>
  <circle cx="60" cy="220" r="4" fill="#ef4444"/>
  <circle cx="180" cy="220" r="4" fill="#ef4444"/>

  <!-- Edge GH (blue, top right) -->
  <line x1="250" y1="50" x2="250" y2="170" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="250" cy="50" r="4" fill="#3b82f6"/>
  <circle cx="250" cy="170" r="4" fill="#3b82f6"/>

  <!-- Labels -->
  <text x="150" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Cube ABCDEFGH</text>
  <text x="40" y="250" font-size="11" fill="#ef4444" font-weight="bold">AB</text>
  <text x="260" y="110" font-size="11" fill="#3b82f6" font-weight="bold">GH</text>
  <text x="150" y="290" font-size="12" text-anchor="middle" fill="#666">Distance AB-GH = a</text>
</svg>
